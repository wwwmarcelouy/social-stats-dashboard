<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Media Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="kicker">Media Kit</p>
      <h1>Social Stats Dashboard</h1>
      <p class="subtitle">A simple, modern snapshot of audience reach across platforms.</p>
    </section>

    <section class="cards" aria-label="Social platform statistics">
      <article class="card youtube">
        <div class="card-header">
          <span class="badge">YouTube</span>
        </div>
        <p class="metric" id="youtubeSubscribers">0</p>
        <p class="label">Subscribers</p>
      </article>

      <article class="card tiktok">
        <div class="card-header">
          <span class="badge">TikTok</span>
        </div>
        <p class="metric">Coming Soon</p>
        <p class="label">Followers Placeholder</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
